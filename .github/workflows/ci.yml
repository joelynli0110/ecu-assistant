name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  clean-env:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package with development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m pylint --jobs=1 src/ecu_assistant

      - name: Test
        run: python -B -m pytest -p no:cacheprovider

      - name: Build wheel and source distribution
        run: python -m build

      - name: Install wheel in a fresh virtual environment
        run: |
          python -m venv .venv-wheel
          . .venv-wheel/bin/activate
          python -m pip install --upgrade pip
          WHEEL="$(python -c 'from pathlib import Path; wheels = sorted(Path("dist").glob("ecu_assistant-*.whl")); assert len(wheels) == 1, wheels; print(wheels[0])')"
          python -m pip install "$WHEEL" "mlflow>=2.13,<4"
          python scripts/smoke_wheel_pyfunc.py --require-wheel-install
